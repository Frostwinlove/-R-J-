<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&J 任務即時同步板</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 0; overflow: hidden !important; }
        ::-webkit-scrollbar { display: none; }
        .header { text-align: center; margin-bottom: 15px; }
        h1 { font-size: 1.2rem; color: #ffca28; margin: 5px; }
        .dashboard { display: flex; justify-content: space-around; align-items: flex-start; gap: 5px; padding: 5px; width: 100vw; box-sizing: border-box; }
        .player-box { flex: 1; min-width: 0; background: #2c2c2c; border-radius: 8px; padding: 5px; border: 1px solid #444; }
        .player-title { text-align: center; color: #ffca28; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #444; padding-bottom: 5px; }
        .floor-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; padding: 2px; }
        .floor-num { font-size: 0.8rem; color: #888; width: 30px; text-align: right; font-weight: bold; }
        .btn-group { display: flex; flex: 1; gap: 4px; }
        .cell { flex: 1; background: #444; border: 1px solid #555; border-radius: 4px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; font-weight: bold; font-size: 1.1rem; transition: 0.15s; }
        .status-v { background-color: #2e7d32 !important; color: white; border-color: #4caf50; } 
        .status-x { background-color: #c62828 !important; color: white; opacity: 0.7; } 
        .status-disabled { background-color: #111 !important; color: #333; border-color: #222; cursor: not-allowed; opacity: 0.2; pointer-events: none; } 
        .answer-summary { margin-top: 15px; padding: 10px; background: #111; border-radius: 4px; text-align: center; border: 1px solid #333; }
        .answer-digits { font-size: 1.4rem; letter-spacing: 4px; font-family: monospace; color: #444; word-break: break-all; }
        .digit-highlight { color: #4caf50; font-weight: bold; }
        .cell:hover:not(.status-disabled) { border-color: #ffca28; background: #555; }
        button { background: #444; color: #eee; border: 1px solid #666; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="header">
        <h1>羅密歐與茱麗葉 - 即時同步板</h1>
        <button onclick="resetGame()">清空整場紀錄</button>
    </div>
    
    <div class="dashboard" id="dashboard"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQEfsWz-hfQswJY_sqsnIbHOVMUpDuWrM",
            authDomain: "rjneo-bec2d.firebaseapp.com",
            databaseURL: "https://rjneo-bec2d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "rjneo-bec2d",
            storageBucket: "rjneo-bec2d.firebasestorage.app",
            messagingSenderId: "331714320566",
            appId: "1:331714320566:web:339e81f6b4c5f9df32ee17"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const gameRef = database.ref('rj_game_live'); 
        const statsRef = database.ref('rj_stats'); // 【新增】統計數據雲端路徑
        
        let gameState = Array.from({length:4},()=>Array.from({length:11},()=>Array.from({length:5},()=>'none')));
        let stats = Array.from({length:4}, () => ({ pass: 0, fail: 0 }));

        function initUI() {
            const db = document.getElementById('dashboard'); 
            db.innerHTML = '';
            for(let p=0; p<4; p++) {
                let html = `<div class="player-box"><div class="player-title">玩家 ${p+1}</div>`;
                for(let f=10; f>=1; f--) {
                    html += `<div class="floor-row"><div class="floor-num">${f}F</div><div class="btn-group" id="g-${p}-${f}"></div></div>`;
                }
                html += `<div class="answer-summary"><div class="answer-digits" id="s-${p}"></div></div></div>`;
                db.innerHTML += html;
            }
            for(let p=0; p<4; p++) for(let f=10; f>=1; f--) {
                const group = document.getElementById(`g-${p}-${f}`);
                for(let n=1; n<=4; n++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; cell.innerText = n; cell.id = `c-${p}-${f}-${n}`;
                    cell.onmousedown = (e) => { e.preventDefault(); handleAction(p, f, n, e.button === 0 ? 'v' : 'x'); };
                    cell.oncontextmenu = (e) => e.preventDefault();
                    group.appendChild(cell);
                }
            }
        }

        function handleAction(p, f, n, t) {
            const current = gameState[p][f][n];
            const newValue = (current === t) ? 'none' : t;
            
            // 更新統計
            if (current === 'none') {
                if (t === 'v') stats[p].pass++;
                if (t === 'x') stats[p].fail++;
            } else if (newValue === 'none') {
                if (current === 'v') stats[p].pass--;
                if (current === 'x') stats[p].fail--;
            }
            
            database.ref('rj_game_live/' + p + '/' + f + '/' + n).set(newValue);
            statsRef.set(stats); // 【關鍵】同步統計到雲端，讓所有人都能算稱號
        }

        function resetGame() {
            if(confirm("確定要清空資料嗎？")) {
                stats = Array.from({length:4}, () => ({ pass: 0, fail: 0 }));
                statsRef.set(stats);
                gameRef.set(Array.from({length:4},()=>Array.from({length:11},()=>Array.from({length:5},()=>'none'))));
            }
        }

        function render() {
            let maxFail = 0, minTotal = 999, failKing = -1, luckyDog = -1;
            stats.forEach((s, p) => {
                let total = s.pass + s.fail;
                if (s.fail > maxFail && s.fail > 0) { maxFail = s.fail; failKing = p; }
                if (total < minTotal) { minTotal = total; luckyDog = p; }
            });

            for (let f = 1; f <= 10; f++) {
                let poss = Array.from({length:4}, ()=>Array.from({length:5}, ()=>true));
                for(let p=0; p<4; p++) for(let n=1; n<=4; n++) {
                    if(gameState[p][f][n] === 'x') poss[p][n] = false;
                    if(gameState[p][f][n] === 'v') for(let i=1; i<=4; i++) if(i !== n) poss[p][i] = false;
                }
                for(let p=0; p<4; p++) for(let n=1; n<=4; n++) if(gameState[p][f][n] === 'v') for(let i=0; i<4; i++) if(i !== p) poss[i][n] = false;
                for(let i=0; i<2; i++) {
                    for(let n=1; n<=4; n++) { let pP = [0,1,2,3].filter(p => poss[p][n]); if(pP.length === 1) for(let j=1; j<=4; j++) if(j!==n) poss[pP[0]][j]=false; }
                    for(let p=0; p<4; p++) { let pN = [1,2,3,4].filter(n => poss[p][n]); if(pN.length === 1) for(let j=0; j<4; j++) if(j!==p) poss[j][pN[0]]=false; }
                }

                for(let p=0; p<4; p++) {
                    let finalVal = '-';
                    const pPossTotal = [1,2,3,4].filter(n => poss[p][n]);
                    for(let n=1; n<=4; n++) {
                        const cell = document.getElementById(`c-${p}-${f}-${n}`);
                        if(!cell) continue;
                        cell.className = 'cell';
                        const nPossTotal = [0,1,2,3].filter(px => poss[px][n]);
                        const isAutoV = (pPossTotal.length === 1 && pPossTotal[0] === n) || (nPossTotal.length === 1 && nPossTotal[0] === p);
                        if(gameState[p][f][n] === 'v' || isAutoV) { cell.classList.add('status-v'); finalVal = n; }
                        else if(gameState[p][f][n] === 'x') cell.classList.add('status-x');
                        else if(!poss[p][n]) cell.classList.add('status-disabled');
                    }

                    const summary = document.getElementById(`s-${p}`);
                    if(f === 1) summary.innerHTML = '';
                    if (f === 6) summary.innerHTML += `<span style="color:#666; margin:0 3px;">-</span>`;
                    summary.innerHTML += `<span class="${finalVal !== '-' ? 'digit-highlight' : ''}">${finalVal}</span>`;

					if (f === 10) {
                        // 1. 取得該玩家目前的數字串 (去除非數字字元)
                        let text = summary.innerText.replace(/[^\d]/g, ''); 
                        
                        // 2. 定義該玩家的總點擊數 (這裡定義給你看了！)
                        let playerTotalClick = stats[p].pass + stats[p].fail;

                        // 3. 檢查：是否 10 層樓都滿了 (長度為 10)
                        if (text.length >= 10) {
                            // 判定 A：地獄倒楣鬼 (點錯最多，且真的有錯過)
                            if (p === failKing && stats[p].fail > 0) {
                                summary.innerHTML += `<br><span style="color:#ff4d4d; font-size:11px; font-weight:bold;">[地獄倒楣鬼]</span>`;
                            } 
                            // 判定 B：躺贏狗 (點擊最少，且總數小於 6 次，且不是倒楣鬼)
                            else if (p === luckyDog && playerTotalClick < 6 && p !== failKing) {
                                summary.innerHTML += `<br><span style="color:#00e5ff; font-size:11px; font-weight:bold;">[躺贏狗]</span>`;
                            }
                        }
                    }
                }
            }
        }

        initUI();
        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) { gameState = data; render(); }
        });
        // 【新增】監聽雲端統計數據
        statsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) { stats = data; render(); }
        });
    </script>
</body>
</html>
