<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&J 任務同步板 - 4人合力版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #1a1a1a; color: #eee; text-align: center; margin: 0; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 15px; overflow-x: auto; padding-bottom: 50px; }
        .player-column { background: #2c2c2c; border-radius: 8px; padding: 10px; min-width: 160px; }
        .player-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #444; padding-bottom: 5px; color: #ffca28; }
        
        .floor-row { margin-bottom: 15px; border-bottom: 1px solid #3d3d3d; padding-bottom: 10px; }
        .floor-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .btn-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        
        .cell {
            background: #444; border: 1px solid #555; border-radius: 4px;
            height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; font-weight: bold; transition: 0.2s;
        }
        
        /* 狀態顏色 */
        .v { background-color: #2e7d32 !important; color: white; border-color: #4caf50; } /* 正確 */
        .x { background-color: #c62828 !important; color: white; border-color: #e57373; opacity: 0.5; } /* 錯誤 */
        .auto-v { background-color: #2e7d32 !important; border: 2px solid #ffca28; box-shadow: 0 0 10px rgba(255,202,40,0.5); } /* 自動推導 */
        .disabled { background-color: #222 !important; color: #555; border-color: #333; cursor: not-allowed; opacity: 0.2; } /* 已排除 */
    </style>
</head>
<body>

    <h1>羅密歐與茱麗葉 - 10層同步板</h1>
    <p>左鍵：V (正確) | 右鍵：X (錯誤) | 再次點擊取消</p>

    <div class="container" id="main-container">
        </div>

    <script>
        const players = ['玩家 A', '玩家 B', '玩家 C', '玩家 D'];
        const container = document.getElementById('main-container');

        // 生成介面
        players.forEach((name, pIdx) => {
            const col = document.createElement('div');
            col.className = 'player-column';
            col.innerHTML = `<div class="player-name">${name}</div>`;

            for (let f = 10; f >= 1; f--) {
                const floor = document.createElement('div');
                floor.className = 'floor-row';
                floor.innerHTML = `<div class="floor-label">第 ${f} 層</div>`;
                
                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';

                for (let num = 1; num <= 4; num++) {
